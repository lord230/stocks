<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Trade Setups</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161b25;
    --surface2: #1e2535;
    --border: rgba(255,255,255,0.07);
    --text: #e8eaf0;
    --muted: #6b7a99;
    --accent: #6c63ff;
    --green: #00d68f;
    --green-bg: rgba(0, 214, 143, 0.1);
    --red: #ff4d6d;
    --red-bg: rgba(255, 77, 109, 0.1);
    --amber: #f4a523;
    --amber-bg: rgba(244, 165, 35, 0.1);
    --mono: 'DM Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.875rem;
  }

  .app-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .refresh-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.7rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .pulse-dot {
    width: 6px;
    height: 6px;
    background: var(--green);
    border-radius: 50%;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.65rem 1rem 0.65rem 2.5rem;
    font-size: 0.9rem;
    font-family: var(--sans);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  #searchInput:focus {
    border-color: var(--accent);
  }

  #searchInput::placeholder { color: var(--muted); }

  .container {
    padding: 1rem;
    max-width: 480px;
    margin: 0 auto;
  }

  .count-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: var(--mono);
  }

  .countdown {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
  }

  .stock-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem;
    margin-bottom: 0.875rem;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .stock-card:active { transform: scale(0.99); }
  .stock-card.gain { border-color: rgba(0, 214, 143, 0.3); }
  .stock-card.loss { border-color: rgba(255, 77, 109, 0.3); }

  .card-accent {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    border-radius: 14px 0 0 14px;
  }
  .gain .card-accent { background: var(--green); }
  .loss .card-accent { background: var(--red); }
  .neutral .card-accent { background: var(--amber); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.75rem;
  }

  .name-wrap {}
  .stock-name {
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: -0.2px;
    line-height: 1.2;
  }
  .stock-type {
    display: inline-block;
    margin-top: 4px;
    font-size: 0.65rem;
    font-family: var(--mono);
    background: var(--surface2);
    color: var(--muted);
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .price-block {
    text-align: right;
  }

  .live-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    font-family: var(--mono);
    display: block;
    margin-bottom: 2px;
  }

  .live-price {
    font-size: 1.2rem;
    font-weight: 700;
    font-family: var(--mono);
    color: var(--text);
  }

  .live-price.gain { color: var(--green); }
  .live-price.loss { color: var(--red); }

  .change-pill {
    display: inline-block;
    font-size: 0.7rem;
    font-family: var(--mono);
    padding: 2px 8px;
    border-radius: 20px;
    margin-top: 4px;
  }
  .change-pill.gain { background: var(--green-bg); color: var(--green); }
  .change-pill.loss { background: var(--red-bg); color: var(--red); }
  .change-pill.neutral { background: var(--amber-bg); color: var(--amber); }

  .loading-shimmer {
    font-size: 1.2rem;
    font-family: var(--mono);
    color: var(--muted);
    animation: shimmer 1.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 0.75rem 0;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    text-align: center;
  }

  .grid-item {}
  .g-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    font-family: var(--mono);
    display: block;
    margin-bottom: 3px;
  }
  .g-val {
    font-size: 0.8rem;
    font-weight: 600;
    font-family: var(--mono);
  }
  .g-val.entry { color: var(--text); }
  .g-val.target { color: var(--green); }
  .g-val.sl { color: var(--red); }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0.75rem;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }

  .groww-link {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    font-weight: 600;
    color: #00d7c3;
    text-decoration: none;
  }

  .groww-link svg { flex-shrink: 0; }

  .status-text {
    font-size: 0.68rem;
    font-family: var(--mono);
    padding: 3px 10px;
    border-radius: 20px;
  }
  .status-text.gain { background: var(--green-bg); color: var(--green); }
  .status-text.loss { background: var(--red-bg); color: var(--red); }
  .status-text.neutral { background: var(--amber-bg); color: var(--amber); }
  .status-text.loading { background: var(--surface2); color: var(--muted); }

  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .disclaimer {
    text-align: center;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 1.5rem;
    line-height: 1.6;
    font-family: var(--mono);
    padding: 0 1rem;
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="app-title">📈 Trade Setups</div>
    <div class="refresh-info">
      <div class="pulse-dot"></div>
      <span id="timerDisplay">Live</span>
    </div>
  </div>
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Search stocks…" autocomplete="off" spellcheck="false">
  </div>
</header>

<div class="container">
  <div class="count-bar">
    <span id="countLabel">Loading…</span>
    <span id="lastUpdated">—</span>
  </div>
  <div id="stockList"></div>
  <p class="disclaimer">
    Prices via Yahoo Finance (15-min delayed) · Auto-refresh every 30s<br>
    🪙 = Penny/Small Cap · Not financial advice
  </p>
</div>

<script>
const stockData = [
  { id: 1,  name: "ADANIPORTS",  entry: "₹1,630–1,650", entryLow: 1630, entryHigh: 1650, target: "₹1,820", targetVal: 1820, sl: "₹1,578", slVal: 1578, type: "Swing",           ticker: "ADANIPORTS",  groww: "adani-ports-and-special-economic-zone-ltd" },
  { id: 2,  name: "HUL",         entry: "₹2,340–2,360", entryLow: 2340, entryHigh: 2360, target: "₹2,520", targetVal: 2520, sl: "₹2,290", slVal: 2290, type: "Swing",           ticker: "HINDUNILVR",  groww: "hindustan-unilever-ltd" },
  { id: 3,  name: "MARUTI",      entry: "₹12,100–12,200", entryLow: 12100, entryHigh: 12200, target: "₹12,950", targetVal: 12950, sl: "₹11,850", slVal: 11850, type: "Swing",   ticker: "MARUTI",      groww: "maruti-suzuki-india-ltd" },
  { id: 4,  name: "L&T",         entry: "₹3,480–3,520", entryLow: 3480, entryHigh: 3520, target: "₹3,800", targetVal: 3800, sl: "₹3,400", slVal: 3400, type: "Swing",           ticker: "LT",          groww: "larsen-and-toubro-ltd" },
  { id: 5,  name: "RELIANCE",    entry: "₹1,370–1,390", entryLow: 1370, entryHigh: 1390, target: "₹1,510", targetVal: 1510, sl: "₹1,330", slVal: 1330, type: "Swing",           ticker: "RELIANCE",    groww: "reliance-industries-ltd" },
  { id: 7,  name: "VEDANTA",     entry: "₹288–295",     entryLow: 288,  entryHigh: 295,  target: "₹345",   targetVal: 345,  sl: "₹268",   slVal: 268,  type: "Swing",           ticker: "VEDL",        groww: "vedanta-ltd" },
  { id: 14, name: "SUZLON 🪙",   entry: "₹42–45",       entryLow: 42,   entryHigh: 45,   target: "₹62",    targetVal: 62,   sl: "₹38",    slVal: 38,   type: "Swing",           ticker: "SUZLON",      groww: "suzlon-energy-ltd" },
  { id: 17, name: "YES BANK 🪙", entry: "₹17.5–18.5",  entryLow: 17.5, entryHigh: 18.5, target: "₹24",    targetVal: 24,   sl: "₹16",    slVal: 16,   type: "Intraday/2D",     ticker: "YESBANK",     groww: "yes-bank-ltd" }
];

const priceCache = {};
let filteredStocks = [...stockData];
let refreshInterval;
let countdown = 30;

function getStatus(stock, price) {
  if (!price) return 'loading';
  const entryMid = (stock.entryLow + stock.entryHigh) / 2;
  if (price <= stock.slVal) return 'loss';
  if (price > entryMid) return 'gain';
  if (price < stock.entryLow) return 'loss';
  return 'neutral';
}

function getStatusLabel(stock, price) {
  if (!price) return 'Fetching...';
  if (price <= stock.slVal) return 'SL Breached';
  if (price >= stock.targetVal) return 'Target Hit!';
  if (price > stock.entryHigh) return 'Above Entry ↑';
  if (price >= stock.entryLow && price <= stock.entryHigh) return 'In Entry Zone';
  if (price < stock.entryLow && price > stock.slVal) return 'Below Entry ↓';
  return 'Watching';
}

function fmtPrice(n) {
  return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function growwUrl(stock) {
  return `https://groww.in/stocks/${stock.groww}`;
}

function renderCards(stocks) {
  const list = document.getElementById('stockList');
  list.innerHTML = '';

  if (stocks.length === 0) {
    list.innerHTML = '<div class="empty-state">No stocks found.<br>Try a different search.</div>';
    document.getElementById('countLabel').textContent = '0 stocks';
    return;
  }

  document.getElementById('countLabel').textContent = `${stocks.length} stock${stocks.length > 1 ? 's' : ''}`;

  stocks.forEach(stock => {
    const cached = priceCache[stock.id];
    const price = cached?.price || null;
    const status = getStatus(stock, price);
    const statusLabel = getStatusLabel(stock, price);

    const card = document.createElement('div');
    card.className = `stock-card ${status}`;
    card.id = `card-${stock.id}`;

    card.innerHTML = `
      <div class="card-accent"></div>
      <div class="card-top">
        <div class="name-wrap">
          <div class="stock-name">${stock.name}</div>
          <span class="stock-type">${stock.type}</span>
        </div>
        <div class="price-block">
          <span class="live-label">Live Price</span>
          ${price
            ? `<div class="live-price ${status}" id="price-${stock.id}">${fmtPrice(price)}</div>`
            : `<div class="loading-shimmer" id="price-${stock.id}">···</div>`
          }
        </div>
      </div>
      <hr class="divider">
      <div class="card-grid">
        <div class="grid-item">
          <span class="g-label">Entry</span>
          <span class="g-val entry">${stock.entry}</span>
        </div>
        <div class="grid-item">
          <span class="g-label">Target</span>
          <span class="g-val target">${stock.target}</span>
        </div>
        <div class="grid-item">
          <span class="g-label">Stop Loss</span>
          <span class="g-val sl">${stock.sl}</span>
        </div>
      </div>
      <div class="card-footer">
        <a class="groww-link" href="${growwUrl(stock)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          Open in Groww ↗
        </a>
        <span class="status-text ${status}" id="status-${stock.id}">${statusLabel}</span>
      </div>
    `;
    list.appendChild(card);
  });
}

const YAHOO_BASE = (ticker) =>
  `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}.NS?interval=1d`;

const PROXIES = [
  (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
];

async function tryFetch(url) {
  for (const makeProxy of PROXIES) {
    try {
      const res = await fetch(makeProxy(url), { signal: AbortSignal.timeout(7000) });
      if (!res.ok) continue;
      const text = await res.text();
      let json;
      try { json = JSON.parse(text); } catch { continue; }
      if (json.contents) {
        try { json = JSON.parse(json.contents); } catch { continue; }
      }
      if (json?.chart?.result?.[0]) return json;
    } catch (_) { continue; }
  }
  return null;
}

async function fetchPrice(stock) {
  const data = await tryFetch(YAHOO_BASE(stock.ticker));

  if (!data) {
    const priceEl = document.getElementById(`price-${stock.id}`);
    if (priceEl) { priceEl.className = 'live-price'; priceEl.textContent = '—'; }
    return;
  }

  const meta = data.chart.result[0].meta;
  const price = meta.regularMarketPrice;
  const prevClose = meta.previousClose || meta.chartPreviousClose || price;
  const changePct = ((price - prevClose) / prevClose * 100);

  priceCache[stock.id] = { price, changePct };

  const status = getStatus(stock, price);
  const statusLabel = getStatusLabel(stock, price);

  const priceEl = document.getElementById(`price-${stock.id}`);
  const statusEl = document.getElementById(`status-${stock.id}`);
  const cardEl  = document.getElementById(`card-${stock.id}`);

  if (priceEl) { priceEl.className = `live-price ${status}`; priceEl.textContent = fmtPrice(price); }
  if (statusEl) { statusEl.className = `status-text ${status}`; statusEl.textContent = statusLabel; }
  if (cardEl) cardEl.className = `stock-card ${status}`;
}

function fetchAll() {
  filteredStocks.forEach(stock => fetchPrice(stock));
  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    `Updated ${now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}`;
}

function startCountdown() {
  countdown = 30;
  clearInterval(refreshInterval);
  refreshInterval = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
      fetchAll();
      countdown = 30;
    }
    document.getElementById('timerDisplay').textContent =
      countdown <= 5 ? `${countdown}s` : 'Live';
  }, 1000);
}

document.getElementById('searchInput').addEventListener('input', function () {
  const q = this.value.trim().toLowerCase();
  filteredStocks = q
    ? stockData.filter(s => s.name.toLowerCase().includes(q) || s.ticker.toLowerCase().includes(q))
    : [...stockData];
  renderCards(filteredStocks);
  filteredStocks.forEach(stock => {
    if (priceCache[stock.id]) {
      const { price } = priceCache[stock.id];
      const status = getStatus(stock, price);
      const priceEl = document.getElementById(`price-${stock.id}`);
      const statusEl = document.getElementById(`status-${stock.id}`);
      const cardEl = document.getElementById(`card-${stock.id}`);
      if (priceEl) { priceEl.className = `live-price ${status}`; priceEl.textContent = fmtPrice(price); }
      if (statusEl) { statusEl.className = `status-text ${status}`; statusEl.textContent = getStatusLabel(stock, price); }
      if (cardEl) cardEl.className = `stock-card ${status}`;
    } else {
      fetchPrice(stock);
    }
  });
});

renderCards(filteredStocks);
fetchAll();
startCountdown();
</script>
</body>
</html>
